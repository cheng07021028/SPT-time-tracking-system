name: Cleanup legacy mojibake pages V126

on:
  workflow_dispatch:
  push:
    paths:
      - 'pages/**'
      - '.github/workflows/cleanup_legacy_mojibake_pages_v126.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove legacy #Uxxxx page files replaced by UTF-8 names
        run: |
          set -e
          rm -f 'pages/01_01. #U5de5#U6642#U7d00#U9304.py'
          rm -f 'pages/06_06. LOG#U67e5#U8a62.py'
          rm -f 'pages/11_11. #U767b#U5165#U7d00#U9304.py'
          git status --short
      - name: Commit cleanup if needed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pages .github/workflows/cleanup_legacy_mojibake_pages_v126.yml
            git commit -m "V126 cleanup legacy mojibake page files"
            git push
          else
            echo "No legacy mojibake pages to clean."
          fi
