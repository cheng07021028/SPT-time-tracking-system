name: Cleanup legacy mojibake pages V133

on:
  workflow_dispatch:
  push:
    paths:
      - 'pages/01_01. 工時紀錄.py'
      - 'pages/02_02. 歷史紀錄.py'
      - 'pages/06_06. LOG查詢.py'
      - 'pages/11_11. 登入紀錄.py'
      - '.github/workflows/cleanup_legacy_mojibake_pages_v133.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove replaced legacy mojibake page filenames
        shell: bash
        run: |
          set -e
          rm -f 'pages/01_01. #U5de5#U6642#U7d00#U9304.py'
          rm -f 'pages/02_02. #U6b77#U53f2#U7d00#U9304.py'
          rm -f 'pages/06_06. LOG#U67e5#U8a62.py'
          rm -f 'pages/11_11. #U767b#U5165#U7d00#U9304.py'
          git status --short
      - name: Commit cleanup if needed
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Cleanup legacy mojibake page filenames V133"
            git push
          else
            echo "No legacy mojibake pages to remove."
          fi
