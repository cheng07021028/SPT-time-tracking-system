name: Cleanup legacy mojibake pages V104

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove legacy #Uxxxx page files replaced by UTF-8 names
        shell: bash
        run: |
          set -e
          rm -f 'pages/01_01. #U5de5#U6642#U7d00#U9304.py'
          rm -f 'pages/10_10. #U6b0a#U9650#U7ba1#U7406.py'
          rm -f 'pages/11_11. #U767b#U5165#U7d00#U9304.py'
          rm -f 'pages/13_13. #U7cfb#U7d71#U8a2d#U5b9a.py'
          git status --short
      - name: Commit cleanup if needed
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Cleanup legacy mojibake page files V104"
            git push
          else
            echo "No legacy mojibake page files to remove."
          fi
