name: Cleanup legacy mojibake pages V110

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove legacy mojibake 02 page when Chinese filename exists
        shell: bash
        run: |
          set -e
          if [ -f "pages/02_02. 歷史紀錄.py" ]; then
            rm -f "pages/02_02. #U6b77#U53f2#U7d00#U9304.py"
            rm -f "pages/__pycache__/02_02. #U6b77#U53f2#U7d00#U9304.cpython-313.pyc"
          fi
      - name: Commit cleanup if needed
        shell: bash
        run: |
          if git diff --quiet --exit-code; then
            echo "No legacy mojibake files to remove."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Cleanup legacy mojibake page files V110"
          git push
