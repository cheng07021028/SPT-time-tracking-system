name: Cleanup legacy mojibake pages V117

on:
  workflow_dispatch:
  push:
    paths:
      - 'pages/02_02. 歷史紀錄.py'
      - '.github/workflows/cleanup_legacy_mojibake_pages_v117.yml'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Remove legacy mojibake 02 page if normalized page exists
        run: |
          set -e
          if [ -f "pages/02_02. 歷史紀錄.py" ]; then
            rm -f pages/02_02.\ #U6b77#U53f2#U7d00#U9304.py
          fi
          git status --short
      - name: Commit cleanup
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Cleanup legacy mojibake 02 page V117"
            git push
          else
            echo "No legacy files to clean."
          fi
