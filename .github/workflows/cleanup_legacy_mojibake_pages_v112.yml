name: Cleanup legacy mojibake page names V112

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Remove legacy #Uxxxx page duplicates replaced by UTF-8 filenames
        shell: bash
        run: |
          set -e
          rm -f 'pages/10_10. #U6b0a#U9650#U7ba1#U7406.py'
          find pages -type d -name '__pycache__' -prune -exec rm -rf {} + || true
      - name: Commit cleanup if needed
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "V112 cleanup legacy mojibake permission page"
            git push
          else
            echo "No legacy mojibake page files to clean."
          fi
