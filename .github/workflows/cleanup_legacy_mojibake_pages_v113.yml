name: Cleanup legacy mojibake page 04 after V113

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove legacy mojibake 04 page
        run: |
          set -e
          rm -f "pages/04_04. #U4eba#U54e1#U540d#U55ae.py"
          rm -f pages/__pycache__/04_04.*.pyc || true
      - name: Commit cleanup if needed
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "cleanup legacy mojibake 04 page after V113"
            git push
          else
            echo "No legacy mojibake 04 page to remove."
          fi
