name: Cleanup Legacy Mojibake Pages V122

on:
  workflow_dispatch:
  push:
    paths:
      - 'pages/06_06. LOG查詢.py'
      - 'pages/11_11. 登入紀錄.py'
      - '.github/workflows/cleanup_legacy_mojibake_pages_v122.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove replaced mojibake page files
        shell: bash
        run: |
          rm -f 'pages/06_06. LOG#U67e5#U8a62.py'
          rm -f 'pages/11_11. #U767b#U5165#U7d00#U9304.py'
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Cleanup legacy mojibake pages v122"
            git push
          else
            echo "No legacy mojibake pages to remove."
          fi
