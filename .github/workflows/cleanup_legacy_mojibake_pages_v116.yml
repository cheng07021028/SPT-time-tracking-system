name: Cleanup legacy mojibake page names V116

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove replaced mojibake page files
        shell: python
        run: |
          from pathlib import Path
          targets = [
              Path('pages/02_02. #U6b77#U53f2#U7d00#U9304.py'),
          ]
          changed = False
          for path in targets:
              if path.exists() and Path('pages/02_02. 歷史紀錄.py').exists():
                  path.unlink()
                  changed = True
          if changed:
              Path('.v116_cleanup_changed').write_text('1', encoding='utf-8')
      - name: Commit cleanup
        if: hashFiles('.v116_cleanup_changed') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages .github/workflows/cleanup_legacy_mojibake_pages_v116.yml
          git commit -m "Cleanup legacy mojibake page names V116"
          git push
