name: Cleanup legacy mojibake page files V120

on:
  workflow_dispatch:
  push:
    paths:
      - 'pages/01_01. 工時紀錄.py'
      - 'pages/03_03. 製令管理.py'
      - 'pages/04_04. 人員名單.py'
      - 'pages/07_07. 今日未紀錄名單.py'
      - '.github/workflows/cleanup_legacy_mojibake_pages_v120.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove legacy mojibake page files already replaced by UTF-8 Chinese filenames
        shell: bash
        run: |
          set -e
          rm -f 'pages/01_01. #U5de5#U6642#U7d00#U9304.py'
          rm -f 'pages/03_03. #U88fd#U4ee4#U7ba1#U7406.py'
          rm -f 'pages/04_04. #U4eba#U54e1#U540d#U55ae.py'
          rm -f 'pages/07_07. #U4eca#U65e5#U672a#U7d00#U9304#U540d#U55ae.py'
      - name: Commit cleanup if needed
        shell: bash
        run: |
          set -e
          if git diff --quiet; then
            echo 'No legacy mojibake page files to remove.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Cleanup legacy mojibake pages V120'
          git push
