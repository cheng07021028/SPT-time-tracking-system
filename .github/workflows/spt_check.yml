name: SPT Time Tracking Check

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile Python files
        run: |
          python -m compileall -q services pages tools

      - name: Remove mojibake filenames
        run: |
          if [ -f tools/remove_mojibake_filenames_v37.py ]; then python tools/remove_mojibake_filenames_v37.py; fi

      - name: Check button state
        run: |
          if [ -f tools/check_v37_button_state.py ]; then python tools/check_v37_button_state.py; fi

      - name: Check buttons and pages
        run: |
          if [ -f tools/check_buttons_and_pages_v31.py ]; then python tools/check_buttons_and_pages_v31.py; fi

      - name: Check authority
        run: |
          if [ -f tools/check_authority_v29.py ]; then python tools/check_authority_v29.py; fi
