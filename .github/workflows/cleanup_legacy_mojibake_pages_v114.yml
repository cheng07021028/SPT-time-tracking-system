name: Cleanup legacy mojibake pages V114

on:
  workflow_dispatch:
  push:
    paths:
      - 'pages/02_02. 歷史紀錄.py'
      - '.github/workflows/cleanup_legacy_mojibake_pages_v114.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove legacy mojibake 02 page when fixed UTF-8 page exists
        run: |
          set -e
          if [ -f "pages/02_02. 歷史紀錄.py" ] && [ -f "pages/02_02. #U6b77#U53f2#U7d00#U9304.py" ]; then
            git rm "pages/02_02. #U6b77#U53f2#U7d00#U9304.py"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "cleanup: remove legacy mojibake 02 history page" || true
            git push || true
          else
            echo "No legacy mojibake 02 page to remove."
          fi
