name: Cleanup legacy mojibake pages V100

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'pages/01_01. 工時紀錄.py'
      - '.github/workflows/cleanup_legacy_mojibake_pages_v100.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove legacy 01 mojibake page file when clean Chinese file exists
        shell: bash
        run: |
          set -e
          changed=0
          if [ -f 'pages/01_01. 工時紀錄.py' ] && [ -f 'pages/01_01. #U5de5#U6642#U7d00#U9304.py' ]; then
            git rm -f 'pages/01_01. #U5de5#U6642#U7d00#U9304.py'
            changed=1
          fi
          if [ "$changed" = "0" ]; then
            echo 'No legacy 01 mojibake file to remove.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m 'Cleanup legacy 01 mojibake page file V100'
          git push
