name: Cleanup legacy mojibake page files V119

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove legacy mojibake 02 page if Chinese page exists
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "pages/02_02. 歷史紀錄.py" ]; then
            git rm -f "pages/02_02. #U6b77#U53f2#U7d00#U9304.py" 2>/dev/null || true
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Cleanup legacy mojibake 02 page after V119"
            git push
          else
            echo "No legacy 02 mojibake page to remove."
          fi
